# Next.js site — proxy to PM2 on 3000.
# Uses port 8080 so port 80 can stay on the API (or merge server blocks later with a domain).
# sudo cp deploy/nginx-smweb.conf /etc/nginx/sites-available/smweb
# sudo ln -sf /etc/nginx/sites-available/smweb /etc/nginx/sites-enabled/smweb
# sudo nginx -t && sudo systemctl reload nginx

upstream smweb_node {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    client_max_body_size 25m;

    location / {
        proxy_pass http://smweb_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
