# Marketing site (Next.js on 3001) — elizble.com / elizble.in / smweb subdomain
# sudo cp to sites-available, enable, nginx -t, reload, then run certbot.

upstream smweb_next {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name elizble.com www.elizble.com elizble.in www.elizble.in smweb.elizble.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://smweb_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
